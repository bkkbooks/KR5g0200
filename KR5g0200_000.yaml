body:
  text: 甲子太玄玉女名靈珠字承翼乙丑太玄玉女名蘭修字青萌丙寅太玄玉女名定華字鬱陵丁卯太玄玉女名須臺字馥猷戊辰太玄玉女名愛浮字衆梨己巳太玄玉女名四浮字華寧庚午太玄玉女名㑹容字流南辛未太玄玉女名澄華字抱珠壬申太玄玉女名𩀱皇字鳳文癸酉太玄玉女名龍嬰字歡生右甲子太玄宫左靈飛玉女部王女皂帔紅銷服青裙執紅銷符甲戌黃素玉女名神光字非廉乙亥黃素玉女名紫春字飛芝丙子黃素玉女名寄風字參盈丁丑黃素玉女名鳳鐶字鬱娥戊寅黃素玉女名叔華字上容巳卯黃素玉女名英玄字羽林庚辰黃素玉女名正齡字香林辛巳黃素玉女名蔚騰字雕羅壬午黃素玉女名琬御字千成癸未黃素玉女名良營字娥昌右甲戍黃素宫左靈飛玉女部玉女青緑黃銷帔紅銷服紫裙執白符甲申太素玉女名真元字瓊石乙酉太素玉女名蘭蕭字玉英丙戌太素玉女名娥玄字和明丁亥太素玉女名興房字緑華戊子太素玉女名翔峰字定暉己丑太素玉女名烟童字偃殊庚寅太素玉女名七翰字靈飛辛卯太素玉女名肇臺字篇敷壬辰太素玉女名蔚金字丹旗癸巳太素玉女名安夫字沙風右甲申太素宫左靈飛玉女部玉女白帔紅銷服紅裙執淺紅符甲午絳雲玉女名丹淳字雲齡乙未絳雲玉女名散陽字靈華丙申絳雲玉女名遂精字玄珠丁酉絳雲玉女名抱雲字緑間戊戍絳雲玉女名房賔字石香巳亥絳雲玉女名清嬰字南靈庚子絳雲玉女名靈群字曲澄辛丑絳雲玉女名素姜字啓清壬寅絳雲玉女名紛華字蔚芝癸卯絳雲玉女名曜英字西安右甲午絳雲宫左靈飛玉女部玉女絳帔紅銷服青裙黃銷符甲辰拜精玉女名龍源字靈素乙巳拜精玉女名歡庭字逸臺丙午拜精玉女名營生字玉生丁未拜精玉女名招風字娥始戊申拜精玉女名夜華字雲嬰巳酉拜精玉女名密明字勝非庚戍拜精玉女名紫虛字容鐶辛亥拜精玉女名鳳華字緑安壬子拜精玉女名儀房字上晋癸丑拜精玉女名寶華字臺昭右甲辰拜精宫右靈飛玉女部玉女紫帔皂緣青裙黃銷服淺紅符甲寅青要玉女名啓元字惠精乙卯青要玉女名慶翔字娥生丙辰青要玉女名幽昌字晨暉丁巳青要玉女名伏華字廣敷戊午青要玉女名緑雲字安昌己未青要玉女名金聲字曲臺庚申青要玉女名飊遊字雲飛辛酉青要玉女名親賢字髙英壬戍青要玉女名神珠字貫衆癸亥青要玉女名雲徊字抱生右甲寅青要宫右靈飛玉女部玉女紫帔皂緣紅銷服青裙黃銷符太極玉精真訣上符以甲子日始日二服一以平旦男服以八莭日日中又服太極玉精真訣上符以乙丑日始日二服一以平旦女以八莭日夜半又服右二符是靈飛六甲之符宗也欲服符先齊六日乃服之六十日乃得服六十玉女符也此二符招神開靈通逹萬精長服不廢飛仙長生既服六十玉女符故當用此符也兼修之也男女各符隨名而用之也忌淹穢經死喪之家不得與人同牀寢卧衣服不假借人禁食五辛及六畜肉又接近婦人尤禁之甚令人神喪魂亡生邪失性災及三世死為下鬼常須燒香於寢牀之首太玄甲子宫玉女一部同服上玄錦帔下青羅飛華裙黃素甲戍宫玉女一部同服黃錦帔紫羅飛羽裙太素甲申宫玉女一部同服白錦帔丹羅飛華裙甲午絳雲宫玉女一部同服丹錦帔青羅飛裙右靈飛六甲玉女服色手中並執玉精神虎符頭並頽雲三角髻餘髮散垂之至腰甲辰拜精宫玉女一部同服紫錦帔碧羅飛華裙甲寅青要宫玉女一部同服紫錦帔丹青飛裙右靈飛六甲玉女服色手中並執玉精金虎符頭並頽雲三角髻餘髮散垂之至腰已上六十二符乃是太極上宫四真人所受於太上大道君受者當須齊潔精誠澡除五纍遣穢汙之漏塵杜淫欲之失正目存六精凝思玉真香烟散室幽身孤房積毫纍著和魂保中髣佛五道神生三宫豁爭競於常輩守寂默以感通者六甲之神不逾年而降見也子能精修此道必致登仙矣信而奉者為靈人不信者身沒鬼部上清六甲靈映之道當得至真之人乃可傳之既速致通降而靈飛易發久勤修之坐在立亡久視變化萬端行厨卒至也九嶷真人許偉逺昔受此方於中嶽宋德玄者周王時人服此靈飛六甲符得道能一日行三千里數變形為鳥獸得真靈之道本在嵩山偉逺久隨之乃受得此法行之道成今處九嶷山有女子郭勺藥趙愛兒王魯連等並受此法而得道者復數十人或遊玄洲或處東華方諸臺今見居之南嶽魏夫人言此郭勺藥者漢度遼將軍陽平郭騫子也少好精誠真人因受其六甲趙愛兒者幽州剌史劉虞別駕趙該姊子好道得尸解後又受此符王魯連者魏文帝城門校尉范陵王伯罡女也亦學道一旦忽委壻李子期李子期者司州魏人清河王傳也期常言此婦狂走一旦失所在上清六甲靈飛遁服此真符遊行八方行此真書當得其人按四極明科傳上清內書者皆列盟奉𧵥所誓乃宣之七百年所傳不過六人限足不復得泄也其受符皆對齊七日𧵥香信於有經之師白素六十尺金鐶六𩀱青絲六兩以代剪髮登壇㰱血破劵之誓以盟奉行靈符不泄之信如違盟負信己身甘受風刀之考陷積夜之河摙䝉山之石以填孟津有經之師所得法信當給與寒栖貧下孤病老弱之輩不得獨用如不遵科典三官檢案死為下鬼切冝敬之慎之矣太上瓊宫靈飛六甲籙
