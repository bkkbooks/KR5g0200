front:
  text: 上清瓊宫靈飛六甲籙集八上清瓊宫靈飛六甲玉女六十人諱字并左右上符太真九都上皇太極四真人受之於太上玉晨髙聖道君左右靈飛六甲符一名玉精真訣一名景中之道一名白羽黑翮𨼆遊上經靈飛六甲神道也六甲之神時乘六龍以宴慶雲盼看六合回降服符者寢房也其八節日又乘白鸞之車駕黑翮之鳳以宴常陽倒景看逰八方之神嶽也回降服符者身和合魂魄通靈達形三氣合香五藏生華坐在立亡役召萬魔履鋒蹈險萬神來和涉山入水㳂海步河不劬津梁不畏巔危變化𨼆遁招風召雷立起雲雨坐致行廚入兵不傷入水不濡山神奉衛玉女來迎服之六年六甲見軀與人語言授子真書長生天地二象同符别寢勿雜遺淫忘欲寂心鏡形乃可見求太極四真人曰六氣順運於十天六甲巡行於幽冥有其符則𨼆化無方聞其名則上𥙷天真行其道則飛虛駕佩其文則玉女執巾用之六年方諸青宫書名玉簡行之九年萬神奉衛真人造房行之十四年太素三元君迎以三晨之羽節衣以紫華之雲帔夕駕八景朝登昆崘揮虎旗以招節吹鳳樂以唱玄萬神扶軒攝風召雲太一參轡白日登晨六甲靈飛左右玉女名字六十人每至甲日平旦向王方閉目內視存六甲一旬之玉女盡來羅立我前衣服形色如上良久畢乃叩齒六通咽液六十過畢而微咒曰左飛右靈八景華精上植琳房下秀丹瓊合度八紀攝御萬萌神通積感六氣練清雲宫玉華乘虛順生錦帔緋裙霞映紫房腰帶虎書絡羽建青手執神符流金火鈴揮邪却魔保我利貞割勒衆妖萬惡泯平同逰三元回老反嬰坐在立亡侍我六丁猛獸衛身從以天兵呼吸江河山嶽流傾卒致行廚金醴玉漿束收虎豹叱咤幽冥役使鬼神攝伏千精所願從心萬事克成分道散軀恣意化形上補真人天地同生耳聰目鏡徹視黃庭六甲玉女為我使令咒畢乃閉目𥘉存思之當平坐按手於膝上勿令人見之見則真光不一思慮傷散念念存心不德他想當須戒之臨服符當先呼直日玉女名畢微咒曰天玄地黃太虛六氣朝服靈精神金虎文當令我真又令我神分散形影封山召靈役使萬精坐亡立存髙逰上清北朝玉晨畢乃服符符文真要如左符並朱書
